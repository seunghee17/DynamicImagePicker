name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          VERSION_NAME="$(grep '^VERSION_NAME=' gradle.properties | cut -d'=' -f2- | tr -d '[:space:]')"

          if [[ -z "${VERSION_NAME}" ]]; then
            echo "VERSION_NAME is empty."
            exit 1
          fi

          echo "version_name=${VERSION_NAME}" >> "${GITHUB_OUTPUT}"
          echo "VERSION_NAME=${VERSION_NAME}" >> "${GITHUB_ENV}"

      - name: Check whether this push should publish
        id: gate
        shell: bash
        run: |
          SHOULD_PUBLISH="true"

          if [[ "${{ github.event_name }}" == "push" ]]; then
            BEFORE_SHA="${{ github.event.before }}"
            AFTER_SHA="${{ github.sha }}"

            if [[ "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
              if git diff "${BEFORE_SHA}" "${AFTER_SHA}" -- gradle.properties | grep -q '^[+-]VERSION_NAME='; then
                SHOULD_PUBLISH="true"
              else
                SHOULD_PUBLISH="false"
              fi
            fi
          fi

          echo "should_publish=${SHOULD_PUBLISH}" >> "${GITHUB_OUTPUT}"

      - name: Build release artifacts
        run: ./gradlew :imagepicker:assembleRelease :imagepicker:publishReleasePublicationToMavenLocal

      - name: Skip publish when version was not changed
        if: steps.gate.outputs.should_publish != 'true'
        run: |
          echo "VERSION_NAME was not changed in this main push."
          echo "Release artifact was built, but publishing was skipped."

      - name: Publish imagepicker to Maven Central
        if: steps.gate.outputs.should_publish == 'true'
        env:
          ORG_GRADLE_PROJECT_VERSION_NAME: ${{ steps.version.outputs.version_name }}
          ORG_GRADLE_PROJECT_signingKeyId: ${{ secrets.MAVEN_GPG_KEY_ID }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          ORG_GRADLE_PROJECT_centralUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_centralPassword: ${{ secrets.SONATYPE_PASSWORD }}
        run: ./gradlew :imagepicker:publishReleasePublicationToCentralRepository
